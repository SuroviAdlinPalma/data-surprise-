<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<div class="container">

    <!-- First Screen -->
    <div id="firstScreen">
        <h1>💌</h1>

        <h2>Hey Bless ❤️</h2>

        <p>
            Someone has something really special to ask you...
        </p>

        <button onclick="openQuestion()">
            Open the Surprise ✨
        </button>
    </div>

    <!-- Second Screen -->
    <div id="questionScreen" style="display:none;">

        <h1>🥺❤️</h1>

        <h2>Will you go on a date with me?</h2>

        <p>
           You make me really happy whenever you take me out. ❤️
 🌹
        </p>

        <div class="buttons">
            <button class="yes" onclick="sayYes()">
                YES 💖
            </button>

            <button id="noBtn" class="no">
                NO 🙈
            </button>
        </div>

    </div>

    <!-- Final Screen -->
    <div id="successScreen" style="display:none;">

        <h1>🎉❤️</h1>

        <h2>YAYYYYY!!</h2>

        <p>
            I love You! 🥹💕
        </p>

        <p>
           Kobe ghurte niya jaba huhhhhh?🥹
        </p>

        <h3>
            ❤️ From your favourite person,<br>
            <span>Bhebla</span>
        </h3>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
